<div class="container mt-4">
  <div class="card">
    <div class="card-header d-flex justify-content-between align-items-center">
      <h4>Заполнение анкеты</h4>
      <button class="btn btn-outline-secondary" routerLink="/patient-questionnaires">
        Назад
      </button>
    </div>
    <div class="card-body">
      <!-- Загрузка -->
      <div *ngIf="loading" class="text-center py-5">
        <div class="spinner-border text-primary" role="status">
          <span class="visually-hidden">Загрузка...</span>
        </div>
        <p class="mt-3">Загрузка анкеты...</p>
      </div>

      <!-- Ошибка -->
      <div *ngIf="error && !loading" class="alert alert-danger">
        {{ error }}
      </div>

      <!-- Успех -->
      <div *ngIf="success" class="alert alert-success">
        {{ success }}
      </div>

      <!-- Форма анкеты (показываем только когда не грузится и нет ошибки) -->
      <div *ngIf="!loading && !error && questionnaire && !success">
        <div class="mb-4">
          <h5>Анкета от {{ questionnaire.date | date:'dd.MM.yyyy' }}</h5>
          <p><strong>Врач:</strong> {{ questionnaire.medic_name }}</p>
        </div>

        <!-- Параметры -->
        <div class="mb-4">
          <h5>Параметры:</h5>
          <div *ngFor="let param of questionnaire.parameters" class="mb-3">
            <label class="form-label">
              <strong>{{ param.name }}</strong>
              <small class="text-muted d-block">{{ param.description }}</small>
            </label>
            <input 
              type="text" 
              class="form-control" 
              [(ngModel)]="responses[param.id]"
              [placeholder]="'Введите ' + param.name.toLowerCase()"
              required>
          </div>
        </div>

        <!-- Комментарий -->
        <div class="mb-4">
          <label class="form-label">
            <strong>Комментарий (необязательно)</strong>
          </label>
          <textarea 
            class="form-control" 
            rows="3"
            [(ngModel)]="comment"
            placeholder="Оставьте свой комментарий или вопрос врачу..."></textarea>
        </div>

        <!-- Кнопки -->
        <div class="d-flex gap-2">
          <button 
            class="btn btn-success" 
            (click)="onSubmit()"
            [disabled]="submitting || !isFormValid()">
            {{ submitting ? 'Отправка...' : 'Отправить врачу' }}
          </button>
          <button 
            class="btn btn-outline-secondary" 
            routerLink="/patient-questionnaires">
            Отмена
          </button>
        </div>
      </div>
    </div>
  </div>
</div>
