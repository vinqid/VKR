<div class="container mt-4">
  <div class="card">
    <div class="card-header d-flex justify-content-between align-items-center">
      <h4>Создание анкеты</h4>
      <button class="btn btn-outline-secondary" (click)="goBack()">
  Назад
</button>
    </div>
    <div class="card-body">
      <div *ngIf="success" class="alert alert-success">
        Анкета успешно создана! Перенаправление...
      </div>

      <form *ngIf="!success" (ngSubmit)="onSubmit()" #form="ngForm">
        <!-- Выбор пациента -->
        <div class="mb-3">
          <label class="form-label">Пациент</label>
          
          <!-- Загрузка пациентов -->
          <div *ngIf="loadingPatients" class="text-muted py-2">
            Загрузка списка пациентов...
          </div>

          <!-- Выпадающий список пациентов (показывается после загрузки) -->
          <select 
            *ngIf="!loadingPatients"
            class="form-control" 
            [(ngModel)]="selectedPatientId" 
            name="patient" 
            required>
            <option [value]="null">Выберите пациента</option>
            <option *ngFor="let p of patients" [value]="p.id">
              {{ p.name || 'Имя не указано' }} ({{ p.birth_date | date:'dd.MM.yyyy' }})
            </option>
          </select>
          
          <div *ngIf="!loadingPatients && patients.length === 0" class="text-warning">
            У вас нет пациентов. Сначала добавьте пациентов.
          </div>
        </div>

        <!-- Дата -->
        <div class="mb-3">
          <label class="form-label">Дата анкетирования</label>
          <input type="date" class="form-control" [(ngModel)]="date" name="date" required>
        </div>

        <!-- Кнопка для выбора параметров -->
        <div class="mb-3">
          <label class="form-label">Отслеживаемые параметры</label>
          
          <!-- Загрузка параметров -->
          <div *ngIf="loadingParams" class="text-muted py-2">
            Загрузка параметров...
          </div>

          <!-- Кнопка выбора параметров (показывается после загрузки) -->
          <div *ngIf="!loadingParams" class="d-flex align-items-center gap-2">
            <button 
              type="button" 
              class="btn btn-outline-primary" 
              (click)="toggleParameters()">
              {{ showParameters ? 'Скрыть параметры' : 'Выбрать параметры' }}
            </button>
            <span class="text-muted">{{ getSelectedParametersText() }}</span>
          </div>
        </div>

        <!-- Список параметров (показывается только при showParameters = true) -->
        <div *ngIf="showParameters && !loadingParams" class="mb-3 p-3 border rounded">
          <div *ngFor="let param of parameters" class="form-check">
            <input 
              type="checkbox" 
              class="form-check-input" 
              [id]="'param' + param.id"
              (change)="toggleParameter(param.id)"
              [checked]="selectedParameterIds.includes(param.id)">
            <label [for]="'param' + param.id" class="form-check-label">
              <strong>{{ param.name }}</strong>
              <small class="text-muted d-block">{{ param.description }}</small>
            </label>
          </div>
        </div>

        <!-- Кнопки -->
        <div class="d-flex gap-2 mt-3">
          <button type="submit" class="btn btn-primary" [disabled]="form.invalid || loading || loadingPatients || loadingParams">
            {{ loading ? 'Создание...' : 'Создать анкету' }}
          </button>
          <button type="button" class="btn btn-secondary" (click)="cancel()">
            Отмена
            </button>
        </div>

        <div *ngIf="error" class="alert alert-danger mt-3">{{ error }}</div>
      </form>
    </div>
  </div>
</div>
