<div class="container mt-4">
  <div class="card">
    <div class="card-header d-flex justify-content-between align-items-center">
      <h4>Динамика состояния</h4>
      <button class="btn btn-outline-secondary" routerLink="/patient-dashboard">
        Назад
      </button>
    </div>
    <div class="card-body">
      <!-- Загрузка -->
      <div *ngIf="loading" class="text-center py-5">
        <div class="spinner-border text-primary" role="status">
          <span class="visually-hidden">Загрузка...</span>
        </div>
        <p class="mt-3">Загрузка статистики...</p>
      </div>

      <!-- Ошибка -->
      <div *ngIf="error && !loading" class="alert alert-danger">
        {{ error }}
      </div>

      <!-- Нет данных -->
      <div *ngIf="!loading && !error && !hasData()" class="alert alert-info">
        У вас пока нет принятых анкет для отображения статистики
      </div>

      <!-- Графики -->
      <div *ngIf="!loading && !error && hasData()">
        <div class="row">
          <div *ngFor="let doctorStat of statsData; let i = index" class="col-12 mb-5">
            <div class="card">
              <div class="card-header bg-light">
                <h5 class="mb-0">Динамика по врачу: {{ doctorStat.medic_name }}</h5>
              </div>
              <div class="card-body">
                <div class="chart-container" style="position: relative; height: 300px; width: 100%;">
                  <canvas
                    baseChart
                    [type]="lineChartType"
                    [data]="getChartConfig(doctorStat, i).data"
                    [options]="getChartConfig(doctorStat, i).options">
                  </canvas>
                </div>
              </div>
            </div>
          </div>
        </div>

        <!-- Пояснение -->
        <div class="alert alert-info mt-3">
          <i class="bi bi-info-circle"></i>
          График показывает динамику ваших оценок по анкетам. Чем выше оценка, тем лучше ваше состояние.
        </div>
      </div>
    </div>
  </div>
</div>
